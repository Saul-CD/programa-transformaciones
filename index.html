<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Transformaciones 2D</title>
        <link rel="stylesheet" href="./style.css" />
    </head>

    <body>
        <svg
            id="canvas"
            preserveAspectRatio="xMidYMid meet"
            style="width: 100vw; height: 100vh; overflow: hidden"
        >
            <g id="panzoom-wrapper">
                <g id="sistema-coordenado">
                    <g id="grid-layer"></g>
                    <g id="plano"></g>
                </g>
            </g>
        </svg>

        <!-- Panel de Controles -->
        <div class="panel controles">
            <h2>Controles</h2>

            <div id="vista-configuracion">
                <label style="display: block; margin-bottom: 10px"
                    >Seleccionar Polígono:</label
                >
                <div id="selector-poligonos" class="grid-poligonos">
                    <button class="btn-poly active" data-poly="triangulo">
                        <svg
                            viewBox="0 0 24 24"
                            width="28"
                            height="28"
                            stroke="currentColor"
                            stroke-width="2"
                            fill="none"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                        >
                            <path d="M12 3L22 20H2L12 3z"></path>
                        </svg>
                        <span>Triángulo</span>
                    </button>

                    <button class="btn-poly" data-poly="rectangulo">
                        <svg
                            viewBox="0 0 24 24"
                            width="28"
                            height="28"
                            stroke="currentColor"
                            stroke-width="2"
                            fill="none"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                        >
                            <rect
                                x="3"
                                y="6"
                                width="18"
                                height="12"
                                rx="2"
                                ry="2"
                            ></rect>
                        </svg>
                        <span>Rectángulo</span>
                    </button>

                    <button class="btn-poly" data-poly="pentagono">
                        <svg
                            viewBox="0 0 24 24"
                            width="28"
                            height="28"
                            stroke="currentColor"
                            stroke-width="2"
                            fill="none"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                        >
                            <polygon
                                points="12 2 22 8.5 18 22 6 22 2 8.5"
                            ></polygon>
                        </svg>
                        <span>Pentágono</span>
                    </button>

                    <button class="btn-poly" data-poly="hexagono">
                        <svg
                            viewBox="0 0 24 24"
                            width="28"
                            height="28"
                            stroke="currentColor"
                            stroke-width="2"
                            fill="none"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                        >
                            <polygon
                                points="12 2 22 7 22 17 12 22 2 17 2 7"
                            ></polygon>
                        </svg>
                        <span>Hexágono</span>
                    </button>
                </div>
                <label style="margin-top: 30px; display: block"
                    >Editar Coordenadas Iniciales:</label
                >
                <div id="entradas-coordenadas" style="overflow-y: auto"></div>

                <button id="btn-inicial" style="margin-top: 15px" class="boton">
                    Graficar y Continuar →
                </button>
            </div>

            <div id="vista-transformacion" style="display: none">
                <label style="display: block; margin-bottom: 10px"
                    >Transformación:</label
                >
                <div
                    id="selector-transformaciones"
                    class="grid-transformaciones"
                >
                    <button class="btn-trans active" data-trans="traslacion">
                        <svg
                            viewBox="0 0 24 24"
                            width="24"
                            height="24"
                            stroke="currentColor"
                            stroke-width="2"
                            fill="none"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                        >
                            <path
                                d="M5 9l-3 3 3 3M9 5l3-3 3 3M19 9l3 3-3 3M9 19l3 3 3-3M2 12h20M12 2v20"
                            ></path>
                        </svg>
                        <span>Traslación</span>
                    </button>

                    <button class="btn-trans" data-trans="rotacion">
                        <svg
                            viewBox="0 0 24 24"
                            width="24"
                            height="24"
                            stroke="currentColor"
                            stroke-width="2"
                            fill="none"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                        >
                            <path
                                d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"
                            ></path>
                            <path d="M3 3v5h5"></path>
                        </svg>
                        <span>Rotación</span>
                    </button>

                    <button class="btn-trans" data-trans="escalamiento">
                        <svg
                            viewBox="0 0 24 24"
                            width="24"
                            height="24"
                            stroke="currentColor"
                            stroke-width="2"
                            fill="none"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                        >
                            <path
                                d="M21 3l-6 6M21 3v6M21 3h-6M14 10L3 21"
                            ></path>
                        </svg>
                        <span>Escala</span>
                    </button>
                </div>

                <div id="entradas"></div>

                <div id="acciones-principales">
                    <button id="btn-transformar" class="boton">
                        Transformar
                    </button>
                </div>

                <div
                    id="estado-confirmacion"
                    class="estado-confirmacion"
                    style="display: none"
                >
                    <p
                        style="
                            font-size: 0.95rem;
                            margin-bottom: 12px;
                            text-align: center;
                            color: #a5d6ff;
                        "
                    >
                        ¡Transformación aplicada! ¿Deseas hacer otra sobre las
                        nuevas coordenadas?
                    </p>
                    <div style="display: flex; gap: 10px">
                        <button id="btn-si-otra" class="boton" style="flex: 1">
                            Sí, continuar
                        </button>
                        <button id="btn-no-terminar" class="boton-secundario">
                            No, reiniciar
                        </button>
                    </div>
                </div>
            </div>
        </div>
        <!-- Panel de Historial -->
        <div class="panel historial">
            <h2>Historial</h2>
            <ul id="historial"></ul>
        </div>

        <!-- Botones flotantes en modo movil -->
        <div class="mobile-fab-container">
            <button id="fab-controls" class="fab">
                <span class="material-icons">settings</span>
            </button>
            <button id="fab-history" class="fab">
                <span class="material-icons">history</span>
            </button>
        </div>

        <script type="module" src="/src/main.js"></script>
    </body>
</html>
